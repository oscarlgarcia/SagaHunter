services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sagahunter
      POSTGRES_USER: sagahunter
      POSTGRES_PASSWORD: sagahunter
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sagahunter"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  saga-hunter:
    build: .
    ports:
      - "3080:3000"
    environment:
      DATABASE_URL: postgresql://sagahunter:sagahunter@postgres:5432/sagahunter
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AGENT_SCHEDULE_INTERVAL_MINUTES: ${AGENT_SCHEDULE_INTERVAL_MINUTES:-15}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/web/node_modules

volumes:
  pgdata:
